<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Loyiham</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #f4f4f4;
        }

        header {
            background-color: #007bff;
            color: white;
            padding: 20px;
        }

        main {
            padding: 40px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <header>
        <h1>Xush kelibsiz!</h1>
    </header>

    <main>
        <h2>Mening birinchi HTML loyiham</h2>
        <p>Bu oddiy HTML, CSS va JavaScript loyihasi.</p>

        <button onclick="showMessage()">Bos!</button>
    </main>

    <script>
        function showMessage() {
            alert("Salom! Loyiha ishlayapti.");
        }
    </script>

</body>
</html>
